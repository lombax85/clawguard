apiVersion: apps/v1
kind: Deployment
metadata:
  name: json-server
  labels:
    app: json-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: json-server
  template:
    metadata:
      labels:
        app: json-server
    spec:
      containers:
        - name: json-server
          image: json-server
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tls
              mountPath: /tls
              readOnly: true
      volumes:
        - name: data
          configMap:
            name: json-server-config
        - name: tls
          secret:
            secretName: json-server-tls
---
apiVersion: v1
kind: Service
metadata:
  name: json-server
spec:
  selector:
    app: json-server
  ports:
    - protocol: TCP
      port: 443
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: bearer-api
spec:
  selector:
    app: json-server
  ports:
    - protocol: TCP
      port: 443
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: header-api
spec:
  selector:
    app: json-server
  ports:
    - protocol: TCP
      port: 443
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: query-api
spec:
  selector:
    app: json-server
  ports:
    - protocol: TCP
      port: 443
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: passthrough-api
spec:
  selector:
    app: json-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3080

apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-with-clawguard
  labels:
    app: client-with-clawguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-with-clawguard
  template:
    metadata:
      labels:
        app: client-with-clawguard
    spec:
      # ─── Init container: iptables redirect ───────────────────
      initContainers:
        - name: iptables-init
          image: iptables-init
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          command: ["sh", "/scripts/iptables-init.sh"]
          volumeMounts:
            - name: iptables-init-script
              mountPath: /scripts
              readOnly: true

      containers:
        # ─── ClawGuard sidecar ─────────────────────────────────
        - name: clawguard
          image: lombax85/clawguard
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: CLAWGUARD_CONFIG
              value: /config/clawguard.yaml
            - name: NODE_EXTRA_CA_CERTS
              value: /trust/bundle.pem
          ports:
            - containerPort: 8000
              name: api
            - containerPort: 8080
              name: http-proxy
            - containerPort: 8443
              name: https-proxy
          volumeMounts:
            - name: clawguard-config
              mountPath: /config
              readOnly: true
            - name: clawguard-ca
              mountPath: /app/data/ca
              readOnly: true
            - name: trust-bundle
              mountPath: /trust
              readOnly: true
            - name: data
              mountPath: /app/data

        # ─── Client container (for tests) ──────────────────────
        - name: client
          image: client
          env:
            - name: SSL_CERT_FILE
              value: /trust/bundle.pem
            - name: CURL_CA_BUNDLE
              value: /trust/bundle.pem
          volumeMounts:
            - name: trust-bundle
              mountPath: /trust
              readOnly: true
          command:
            - /bin/sh
            - -c
            - /entrypoint.sh

      volumes:
        - name: clawguard-config
          configMap:
            name: clawguard-config
        - name: clawguard-ca
          secret:
            secretName: clawguard-ca
            items:
              - key: tls.crt
                path: ca.crt
              - key: tls.key
                path: ca.key
        - name: trust-bundle
          configMap:
            name: clawguard-trust-bundle
        - name: iptables-init-script
          configMap:
            name: iptables-init-script
        - name: data
          emptyDir: {}

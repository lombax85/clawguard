server:
  port: 8000
  agentKey: "dummy-key-for-local-dashboard"
proxy:
  enabled: false
  caDir: "/app/data/ca"
transparentProxy:
  enabled: true
  httpPort: 8080
  httpsPort: 8443
secrets:
  vault:
    address: "http://vault:8200"
    auth:
      method: kubernetes
      role: clawguard
services:
  bearer-test:
    upstream: "https://json-server"
    hostnames:
      - "bearer-api"
    auth:
      type: "bearer"
      token: "vault:secret/data/bearer-test#token"
      dummyToken: "dummy-bearer-placeholder"
    policy:
      default: "auto_approve"
  header-test:
    upstream: "https://json-server"
    hostnames:
      - "header-api"
    auth:
      type: "header"
      headerName: "X-API-Key"
      token: "vault:secret/data/header-test#token"
      dummyToken: "dummy-header-placeholder"
    policy:
      default: "auto_approve"
  query-test:
    upstream: "https://json-server"
    hostnames:
      - "query-api"
    auth:
      type: "query"
      paramName: "api_key"
      token: "vault:secret/data/query-test#token"
      dummyToken: "dummy-query-placeholder"
    policy:
      default: "auto_approve"
admin:
  enabled: false
audit:
  path: "/app/data/clawguard.db"
  logPayload: true

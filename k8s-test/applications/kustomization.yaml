apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clawguard
resources:
  - json-server.yaml
  - clawguard.yaml
  - clawguard-vault.yaml
  - clawguard-vault-k8s.yaml
  - vault.yaml
configMapGenerator:
  - name: clawguard-config
    files:
      - configmaps/clawguard.yaml
  - name: clawguard-vault-config
    files:
      - configmaps/clawguard-vault.yaml
  - name: clawguard-vault-k8s-config
    files:
      - configmaps/clawguard-vault-k8s.yaml
  - name: iptables-init-script
    files:
      - configmaps/iptables-init.sh
  - name: json-server-config
    files:
      - configmaps/db.json
      - configmaps/routes.json

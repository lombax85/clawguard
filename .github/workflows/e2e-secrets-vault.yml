name: "E2E: Secrets - Vault"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e-vault:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          sudo install skaffold /usr/local/bin/

      - name: Build and Deploy with Skaffold
        run: |
          eval $(minikube docker-env)
          skaffold run

      - name: Wait for Vault and Deployments
        run: |
          kubectl -n clawguard rollout status deployment/vault --timeout=120s
          kubectl -n clawguard wait --for=condition=complete job/vault-seed --timeout=120s
          kubectl -n clawguard rollout status deployment/json-server --timeout=120s
          kubectl -n clawguard rollout status deployment/client-with-clawguard-vault --timeout=180s
          kubectl -n clawguard rollout status deployment/client-with-clawguard-vault-k8s --timeout=180s
          sleep 10

      - name: "Test: Vault Token Auth"
        run: |
          kubectl -n clawguard exec deploy/client-with-clawguard-vault -c client -- bash /test-vault.sh

      - name: "Test: Vault Kubernetes Auth"
        run: |
          kubectl -n clawguard exec deploy/client-with-clawguard-vault-k8s -c client -- bash /test-vault.sh

      - name: Dump Logs on Failure
        if: failure()
        run: |
          for deploy in client-with-clawguard-vault client-with-clawguard-vault-k8s; do
            echo "=== $deploy (clawguard) ==="
            kubectl -n clawguard logs deploy/$deploy -c clawguard 2>/dev/null || true
            echo ""
          done
          echo "=== Vault ==="
          kubectl -n clawguard logs deploy/vault || true
          echo ""
          echo "=== Vault seed job ==="
          kubectl -n clawguard logs job/vault-seed --all-containers || true
          echo ""
          echo "=== json-server ==="
          kubectl -n clawguard logs deploy/json-server || true
          echo ""
          echo "=== Pod status ==="
          kubectl -n clawguard get pods -o wide || true
          echo ""
          echo "=== Events ==="
          kubectl -n clawguard get events --sort-by='.lastTimestamp' || true
